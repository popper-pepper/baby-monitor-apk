name: 构建 APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      # GitHub Actions 的 Ubuntu runner 预装了 Docker，无需额外安装
      - name: 使用 Buildozer 构建 APK（详细日志）
        run: |
          cd ${{ github.workspace }}
          echo "=== 文件列表 ==="
          ls -la
          echo "=== data/ 目录 ==="
          ls -la data/ || echo "data/ 目录不存在"
          echo "=== 开始构建 ==="
          # 写入详细构建日志到文件
          sudo docker run --interactive --tty --rm \
            --volume ${{ github.workspace }}:/home/user/hostcwd \
            --volume /home/runner/.buildozer:/home/user/.buildozer \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            buildozer --verbose android debug 2>&1 | tee build_output.log; exit_code=${PIPESTATUS[0]}; echo "=== 构建退出码: $exit_code ==="; exit $exit_code

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: ${{ github.workspace }}/build_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: baby-monitor-apk
          path: |
            ${{ github.workspace }}/bin/*.apk
            ${{ github.workspace }}/*.apk
          retention-days: 30
          if-no-files-found: error



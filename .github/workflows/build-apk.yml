name: 构建 APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: 安装 Docker (Buildozer 需要)
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          sudo systemctl start docker

      - name: 使用 Buildozer 构建 APK
        run: |
          cd ${{ github.workspace }}
          # data/icon.png 已提交到仓库，无需重新生成
          echo "文件列表:"
          ls -la data/
          echo "---"
          sudo docker run --interactive --tty --rm \
            --volume ${{ github.workspace }}:/home/user/hostcwd \
            --volume ~/.buildozer:/home/user/.buildozer \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: baby-monitor-apk
          path: |
            ${{ github.workspace }}/bin/*.apk
            ${{ github.workspace }}/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: 上传构建日志（如果失败）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: ${{ github.workspace }}/.buildozer/**/*.log
          retention-days: 7
